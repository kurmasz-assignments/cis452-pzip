name: Autograder

# Only runs when manually triggered
on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:

      - name: Check if one hour has passed
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow_id = 'pzip.yml'; // your workflow filename
            const actor = context.actor; // person who triggered the workflow
      
            // Bypass rate limit for instructor
            const exemptUsers = ['kurmasz']; // add your GitHub username(s)
            if (exemptUsers.includes(actor)) {
              console.log(`Rate limit bypassed for ${actor}`);
              return;
            }
      
            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id,
              status: 'completed',
              per_page: 1
            });

            if (runs.data.workflow_runs.length > 0) {
              const lastRun = new Date(runs.data.workflow_runs[0].created_at);
              const now = new Date();
              const minutesSinceLastRun = (now - lastRun) / (1000 * 60);
              console.log(`Last run: ${lastRun}`);
              console.log(`Now: ${now}`);
              console.log(`Minutes since last run: ${minutesSinceLastRun}`);

              const requiredDelay = 60;
              if (minutesSinceLastRun < requiredDelay) {
                const minutesRemaining = Math.ceil((requiredDelay - minutesSinceLastRun));
                core.setFailed(`Please wait ${minutesRemaining} more minutes before running again.`);
              }
            }

      # Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Take a peek
      - name: Take a peek
        run: find .

      - name: Build with Make
        run: |
          make clean
          make

      - name: Create test data
        run:  sh generateTestData

      - name: Run instructor tests
        run: sh runTests
